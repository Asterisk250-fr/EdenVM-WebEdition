<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdenVM</title>

<!-- V86 Emulator -->
<script src="https://cdn.jsdelivr.net/npm/v86@latest/build/libv86.js"></script>

<style>
:root {
    --bg: #050505;
    --panel: #0f0f0f;
    --accent: #00fff0;
    --accent2: #ff00ea;
}

body {
    margin: 0;
    background: radial-gradient(circle at 20% 20%, #1a1a2e, #050505);
    color: white;
    font-family: Arial, sans-serif;
}

/* Top bar */
#topbar {
    height: 60px;
    background: black;
    border-bottom: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
}

#title {
    color: var(--accent);
    font-weight: bold;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

/* Layout */
#container {
    display: flex;
    height: calc(100vh - 60px);
}

#sidebar {
    width: 300px;
    background: var(--panel);
    padding: 20px;
    border-right: 1px solid #222;
}

#main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: black;
}

/* Screen */
#screen_container canvas {
    display: block;
    border: 2px solid var(--accent);
    box-shadow: 0 0 30px var(--accent);
}

/* Inputs */
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: black;
    border: 1px solid #333;
    color: white;
}

.boot-btn {
    width: 100%;
    margin-top: 20px;
    background: linear-gradient(45deg, var(--accent), var(--accent2));
    color: black;
    font-weight: bold;
}
</style>
</head>

<body>

<div id="topbar">
    <div id="title">EdenVM</div>
    <button onclick="location.reload()">Reset</button>
</div>

<div id="container">

    <div id="sidebar">
        <h3>VM Settings</h3>

        <label>Name</label>
        <input id="name" value="MyVM">

        <label>RAM (MB)</label>
        <input id="ram" type="number" value="256">

        <label>OS</label>
        <select id="os">
            <option value="https://copy.sh/v86/images/alpine-linux.iso">Linux (Alpine)</option>
            <option value="https://copy.sh/v86/images/kolibri.img">KolibriOS</option>
        </select>

        <button class="boot-btn" onclick="boot()">BOOT</button>
    </div>

    <div id="main">
        <div id="screen_container"></div>
    </div>

</div>

<script>
let emulator = null;

function boot() {
    const screen = document.getElementById("screen_container");
    screen.innerHTML = "";

    const ram = parseInt(document.getElementById("ram").value);
    const os = document.getElementById("os").value;
    const name = document.getElementById("name").value;

    document.getElementById("title").innerText = "RUNNING: " + name;

    console.log("Booting VM...");

    emulator = new V86Starter({
        wasm_path: "https://cdn.jsdelivr.net/npm/v86@latest/build/",
        memory_size: ram * 1024 * 1024,

        screen_container: screen,

        bios: {
            url: "https://cdn.jsdelivr.net/npm/v86@latest/bios/seabios.bin"
        },
        vga_bios: {
            url: "https://cdn.jsdelivr.net/npm/v86@latest/bios/vgabios.bin"
        },

        autostart: true,

        cdrom: os.endsWith(".iso") ? { url: os } : undefined,
        fda: os.endsWith(".img") ? { url: os } : undefined
    });

    emulator.add_listener("screen-set-mode", () => {
        const canvas = document.querySelector("#screen_container canvas");
        if (canvas) {
            canvas.style.display = "block";
            console.log("Canvas ready");
        }
    });

    emulator.add_listener("download-error", e => {
        console.error("Download failed:", e);
        alert("OS failed to load. Try different internet.");
    });
}
</script>

</body>
</html>
