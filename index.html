<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EdenVM Test</title>

<!-- V86 -->
<script src="https://cdn.jsdelivr.net/npm/v86@latest/build/libv86.js"></script>

<style>
body {
    background: black;
    color: white;
    font-family: sans-serif;
    text-align: center;
}

#screen_container {
    margin-top: 20px;
}

canvas {
    border: 2px solid cyan;
}
</style>
</head>

<body>

<h1>EdenVM Test</h1>

<button onclick="startVM()">Start VM</button>

<div id="screen_container"></div>

<script>
function startVM() {
    const screen = document.getElementById("screen_container");
    screen.innerHTML = "";

    console.log("Starting VM...");

    new V86Starter({
        wasm_path: "https://cdn.jsdelivr.net/npm/v86@latest/build/",
        memory_size: 256 * 1024 * 1024,

        screen_container: screen,

        bios: {
            url: "https://cdn.jsdelivr.net/npm/v86@latest/bios/seabios.bin"
        },
        vga_bios: {
            url: "https://cdn.jsdelivr.net/npm/v86@latest/bios/vgabios.bin"
        },

        cdrom: {
            url: "https://copy.sh/v86/images/alpine-linux.iso"
        },

        autostart: true,
    });
}
</script>

</body>
</html>
