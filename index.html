<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdenVM | Advanced Cloud Console</title>
    <link rel="manifest" href="manifest.json">
    <!-- Load the Emulator Engine -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --bg: #0d0d0d; --panel: #1a1a1a; --accent: #2ecc71; --text: #f1f1f1; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 350px; background: var(--panel); border-right: 2px solid #333; padding: 20px; overflow-y: auto; z-index: 10; }
        .logo { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .section { background: #222; border: 1px solid #444; border-radius: 8px; margin-bottom: 10px; padding: 12px; }
        label { display: block; font-size: 11px; color: #888; margin-top: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 8px; background: #111; border: 1px solid #555; color: #fff; border-radius: 4px; box-sizing: border-box; }
        .btn-boot { width: 100%; padding: 15px; background: var(--accent); border: none; color: #000; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 15px; font-size: 16px; }
        #main { flex-grow: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        #screen_container { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        #debug_log { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #0f0; font-family: monospace; font-size: 10px; padding: 10px; border-radius: 5px; max-width: 250px; pointer-events: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="logo">EdenVM_</div>
    
    <div class="section">
        <label>System RAM (MB)</label>
        <input type="number" id="ram" value="512" min="128" max="2048">
        
        <label>Video Adapter</label>
        <select id="vga_type">
            <option value="std">Standard VGA</option>
            <option value="cirrus">Cirrus Logic (Legacy)</option>
        </select>
    </div>

    <div class="section">
        <label>Boot Source</label>
        <select id="os_select" onchange="document.getElementById('upload_row').style.display = (this.value=='custom'?'block':'none')">
            <option value="https://copy.sh">Arch Linux (CLI)</option>
            <option value="https://copy.sh">KolibriOS (GUI)</option>
            <option value="custom">-- Upload My Own ISO --</option>
        </select>
        <div id="upload_row" style="display:none; margin-top:10px;">
            <input type="file" id="local_iso">
        </div>
    </div>

    <div class="section">
        <label>Firmware (Optional)</label>
        <input type="file" id="bios_up">
        <p style="font-size: 9px; color: #666;">Defaults to SeaBIOS if empty.</p>
    </div>

    <button class="btn-boot" onclick="boot()">POWER ON EdenVM</button>
</div>

<div id="main">
    <div id="debug_log" id="log_text">SYSTEM READY...</div>
    <div id="screen_container">
        <div style="color:#222; font-family: monospace;">[ EDEN_VM SYSTEM_IDLE ]</div>
        <canvas style="display:none"></canvas>
    </div>
</div>

<script>
    const log = document.getElementById('debug_log');

    async function getFile(id) {
        const f = document.getElementById(id).files;
        if(!f || f.length === 0) return null;
        return new Promise(res => {
            const r = new FileReader();
            r.onload = e => res(e.target.result);
            r.readAsArrayBuffer(f[0]);
        });
    }

    async function boot() {
        log.innerText = "INITIALIZING CORE...";
        
        const config = {
            wasm_path: "https://cdn.jsdelivr.net",
            memory_size: parseInt(document.getElementById('ram').value) * 1024 * 1024,
            vga_memory_size: 16 * 1024 * 1024,
            screen_container: document.getElementById("screen_container"),
            autostart: true,
        };

        // Load BIOS/VGA Firmware
        const b = await getFile('bios_up');
        config.bios = b ? { buffer: b } : { url: "https://copy.sh" };
        config.vga_bios = { url: "https://copy.sh" };

        // Load ISO
        const choice = document.getElementById('os_select').value;
        if(choice === 'custom') {
            const iso = await getFile('local_iso');
            if(!iso) { alert("Please upload an ISO first!"); return; }
            config.cdrom = { buffer: iso };
        } else {
            config.cdrom = { url: choice };
        }

        try {
            new V86Starter(config);
            log.innerText = "STATUS: RUNNING";
        } catch (e) {
            log.innerText = "ERROR: " + e.message;
            console.error(e);
        }
    }

    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => {
            console.log("EdenVM Service Worker Registered");
        }).catch(err => {
            console.log("Service Worker Failed: ", err);
        });
    }
</script>

</body>
</html>
