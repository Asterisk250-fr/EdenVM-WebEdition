<script>
    let emulator = null;

    // Load saved VMs on startup
    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('edenvms') || '[]');
        const grid = document.getElementById('vm-grid');

        grid.innerHTML = saved.map((vm, i) => `
            <div class="vm-card" onclick="launchSaved(${i})">
                <h3 class="playwrite-text">${vm.name}</h3>
                <p>${vm.ram}MB RAM | ${vm.osName}</p>
            </div>
        `).join('');
    };

    // Show VM creator UI
    function showCreator() {
        document.getElementById('home-menu').style.display = 'none';
        document.getElementById('interface').style.display = 'flex';
    }

    // Save VM + launch
    function saveAndLaunch() {
        const osSelect = document.getElementById('os_select');

        const data = {
            name: document.getElementById('vm_name').value,
            ram: document.getElementById('ram').value,
            disk: document.getElementById('hdd_size').value,
            os: osSelect.value,
            osName: osSelect.options[osSelect.selectedIndex].text
        };

        const saved = JSON.parse(localStorage.getItem('edenvms') || '[]');
        saved.push(data);
        localStorage.setItem('edenvms', JSON.stringify(saved));

        boot(data);
    }

    // Launch existing VM
    function launchSaved(i) {
        const saved = JSON.parse(localStorage.getItem('edenvms') || '[]');
        if (!saved[i]) return;

        showCreator();
        boot(saved[i]);
    }

    // Boot VM (FIXED + WORKING)
    async function boot(c) {
        if (typeof V86Starter === "undefined") {
            alert("VM Engine failed to load. Check your internet.");
            return;
        }

        document.getElementById('vm-title').innerText = "RUNNING: " + c.name.toUpperCase();
        document.getElementById('sidebar').style.display = "none";
        document.getElementById('vm-tool-bar').style.top = "0";

        const config = {
            wasm_path: "https://cdn.jsdelivr.net/npm/v86@latest/build/",
            memory_size: parseInt(c.ram) * 1024 * 1024,
            screen_container: document.getElementById("screen_container"),

            bios: {
                url: "https://cdn.jsdelivr.net/npm/v86@latest/bios/seabios.bin"
            },
            vga_bios: {
                url: "https://cdn.jsdelivr.net/npm/v86@latest/bios/vgabios.bin"
            },

            autostart: true,
        };

        // Add virtual disk if selected
        if (parseInt(c.disk) > 0) {
            config.hda = {
                size: parseInt(c.disk)
            };
        }

        // Load OS image
        if (c.os.endsWith('.img')) {
            config.fda = { url: c.os };
        } else {
            config.cdrom = { url: c.os };
        }

        // Start emulator
        emulator = new V86Starter(config);

        // Show screen when ready
        emulator.add_listener("screen-set-mode", () => {
            const canvas = document.querySelector("#screen_container canvas");
            if (canvas) canvas.style.display = "block";
        });

        // Debug info
        emulator.add_listener("emulator-ready", () => {
            console.log("VM booted successfully");
        });

        emulator.add_listener("emulator-stopped", () => {
            console.log("VM stopped");
        });
    }
</script>
