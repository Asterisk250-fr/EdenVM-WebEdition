<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdenVM | Pro Console</title>
    <!-- FIX: This is the ONLY reliable CDN that GitHub Pages won't block -->
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --panel: #161616; --accent: #00fff0; --text: #eee; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 350px; background: var(--panel); border-right: 1px solid #333; padding: 20px; overflow-y: auto; z-index: 10; transition: 0.5s; }
        .logo { font-family: 'Orbitron'; font-size: 22px; color: var(--accent); margin-bottom: 20px; text-shadow: 0 0 10px var(--accent); }
        .section { background: #222; border-radius: 8px; padding: 12px; margin-bottom: 10px; border: 1px solid #333; }
        label { display: block; font-size: 11px; color: #888; margin-top: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 8px; background: #111; border: 1px solid #444; color: #fff; border-radius: 4px; margin-top: 4px; box-sizing: border-box; }
        
        #vm-tool-bar { position: fixed; top: -60px; left: 0; width: 100%; height: 50px; background: rgba(20,20,20,0.9); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--accent); transition: 0.5s; z-index: 100; box-sizing: border-box;}
        .vm-info { font-family: 'Orbitron'; color: var(--accent); font-size: 11px; }

        #main { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        #screen_container canvas { display: none; box-shadow: 0 0 40px rgba(0,255,240,0.2); }
        #status-text { font-family: 'Orbitron'; color: var(--accent); letter-spacing: 2px; }
        
        .btn-boot { width: 100%; padding: 15px; background: var(--accent); border: none; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 14px; margin-top: 10px; font-family: 'Orbitron'; color: #000; }
        .btn-boot:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

<div id="vm-tool-bar">
    <div class="vm-info" id="active-os-name">OS: IDLE</div>
    <div class="controls-right">
        <button onclick="toggleFS()" style="background:#333; color:white; border:1px solid #555; padding:5px 10px; cursor:pointer;">FULLSCREEN</button>
        <button onclick="location.reload()" style="background:#333; color:#ff4d4d; border:1px solid #ff4d4d; padding:5px 10px; cursor:pointer; margin-left:10px;">SHUTDOWN</button>
    </div>
</div>

<div id="sidebar">
    <div class="logo">EdenVM_</div>
    
    <div class="section">
        <label>CPU & RAM (MB)</label>
        <input type="number" id="ram" value="512">
        <label>CPU Features</label>
        <select id="cpu_gen"><option value="default">Standard x86</option><option value="acpi">ACPI Enabled</option></select>
    </div>

    <div class="section">
        <label>Drive Configuration</label>
        <select id="drive_type">
            <option value="hdd">HDD (Mechanical)</option>
            <option value="ssd">SSD (Flash)</option>
            <option value="nvme">NVMe (Fast)</option>
        </select>
        <label>Virtual Disk Size</label>
        <select id="hdd_size">
            <option value="0">No Disk</option>
            <option value="2147483648">2 GB</option>
            <option value="10737418240">10 GB</option>
        </select>
    </div>

    <div class="section">
        <label>Graphics</label>
        <select id="vga_type">
            <option value="std">Standard VGA</option>
            <option value="cirrus">Cirrus Logic</option>
        </select>
    </div>

    <div class="section">
        <label>Boot Source</label>
        <select id="os_select" onchange="document.getElementById('up_row').style.display=(this.value=='up'?'block':'none')">
            <option value="https://copy.sh">Arch Linux (Tiny)</option>
            <option value="https://copy.sh">KolibriOS</option>
            <option value="up">-- Upload ISO --</option>
        </select>
        <div id="up_row" style="display:none; margin-top:10px;">
            <input type="file" id="local_iso">
        </div>
    </div>

    <button class="btn-boot" onclick="boot()">POWER ON EdenVM</button>
</div>

<div id="main">
    <div id="screen_container">
        <div id="status-text">[ READY ]</div>
        <canvas></canvas>
    </div>
</div>

<script>
    let emulator = null;

    async function getBuf(id) {
        const file = document.getElementById(id).files[0];
        if(!file) return null;
        return new Promise(res => {
            const r = new FileReader();
            r.onload = e => res(e.target.result);
            r.readAsArrayBuffer(file);
        });
    }

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    async function boot() {
        if (typeof V86Starter === "undefined") {
            alert("ENGINE ERROR: The emulator script failed to load from GitHub's CDN. Try refreshing in 10 seconds.");
            return;
        }

        const osSelect = document.getElementById('os_select');
        document.getElementById('active-os-name').innerText = "VM: " + osSelect.options[osSelect.selectedIndex].text.toUpperCase();
        document.getElementById('sidebar').style.marginLeft = "-350px"; 
        document.getElementById('vm-tool-bar').style.top = "0";
        document.getElementById('status-text').innerText = "[ INITIALIZING KERNEL ]";

        const config = {
            // Updated to the ONLY reliable CDN links for WASM and BIOS
            wasm_path: "https://cdn.jsdelivr.net",
            memory_size: parseInt(document.getElementById('ram').value) * 1024 * 1024,
            vga_memory_size: 16 * 1024 * 1024,
            screen_container: document.getElementById("screen_container"),
            bios: { url: "https://cdn.jsdelivr.net" },
            vga_bios: { url: "https://cdn.jsdelivr.net" },
            acpi: document.getElementById('cpu_gen').value === 'acpi',
            autostart: true,
        };

        const hSize = parseInt(document.getElementById('hdd_size').value);
        if(hSize > 0) config.hda = { size: hSize };

        if(osSelect.value === 'up') {
            const buffer = await getBuf('local_iso');
            if(!buffer) return alert("Please select a file first.");
            config.cdrom = { buffer: buffer };
        } else {
            if(osSelect.value.endsWith('.img')) config.fda = { url: osUrl };
            else config.cdrom = { url: osSelect.value };
        }

        try {
            emulator = new V86Starter(config);
            emulator.add_listener("screen-set-mode", function() {
                document.querySelector("#screen_container canvas").style.display = "block";
                document.getElementById('status-text').style.display = "none";
            });
        } catch(e) {
            document.getElementById('status-text').innerText = "[ BOOT ERROR ]";
            console.error(e);
        }
    }
</script>
</body>
</html>
