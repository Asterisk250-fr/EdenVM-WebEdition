<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdenVM | Pro Console</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <!-- STABLE ENGINE LOAD -->
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --accent: #00fff0; 
            --panel: rgba(255, 255, 255, 0.05);
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #050505; 
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            color: #f8f9fa; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        #sidebar { 
            width: 350px; 
            background: rgba(10, 10, 10, 0.9); 
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255,255,255,0.1); 
            padding: 25px; 
            z-index: 10;
        }
        .logo { 
            font-family: 'Orbitron', sans-serif;
            font-size: 24px; 
            color: var(--accent); 
            margin-bottom: 30px; 
            text-shadow: 0 0 10px var(--accent);
        }
        .section { 
            background: var(--panel); 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        label { display: block; font-size: 10px; color: #888; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px;}
        input, select { 
            width: 100%; padding: 10px; background: #000; 
            border: 1px solid #333; color: #fff; border-radius: 6px; margin-top: 5px; 
            box-sizing: border-box; outline: none;
        }
        #vm-tool-bar { 
            position: fixed; top: -70px; left: 0; width: 100%; height: 60px; 
            background: rgba(5, 5, 5, 0.95); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 30px; 
            border-bottom: 2px solid var(--accent); transition: 0.5s; z-index: 100; box-sizing: border-box;
        }
        #main { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        #screen_container { background: #000; position: relative; }
        #screen_container canvas { display: none; box-shadow: 0 0 50px rgba(0, 255, 240, 0.2); border: 1px solid #222; }
        #boot-status { color: var(--accent); font-family: 'Orbitron', monospace; letter-spacing: 2px; }
        .btn-boot { 
            width: 100%; padding: 16px; 
            background: linear-gradient(45deg, #00fff0, #ff00ea); 
            border: none; font-weight: bold; border-radius: 8px; cursor: pointer; 
            font-size: 14px; margin-top: 20px; color: #000; font-family: 'Orbitron';
        }
    </style>
</head>
<body>

<div id="vm-tool-bar">
    <div style="color: var(--accent); font-family: 'Orbitron';" id="active-os-name">SYSTEM: OFFLINE</div>
    <div class="controls-right">
        <button onclick="location.reload()" style="background:none; border:1px solid #ff4d4d; color:#ff4d4d; padding:5px 15px; cursor:pointer; border-radius:4px;">SHUTDOWN</button>
    </div>
</div>

<div id="sidebar">
    <div class="logo">EdenVM_</div>
    <div class="section">
        <label>Memory (MB)</label>
        <input type="number" id="ram" value="256">
    </div>
    <div class="section">
        <label>Operating System</label>
        <select id="os_select">
            <option value="https://copy.sh">Linux (Command Line)</option>
            <option value="https://copy.sh">KolibriOS (Graphic UI)</option>
        </select>
    </div>
    <button class="btn-boot" onclick="boot()">INITIALIZE SYSTEM</button>
</div>

<div id="main">
    <div id="screen_container">
        <div id="boot-status">[ STANDBY ]</div>
        <canvas></canvas>
    </div>
</div>

<script>
    let emulator = null;

    async function boot() {
        if (typeof V86Starter === "undefined") {
            alert("Engine Error: V86 core not found. Check Console (F12).");
            return;
        }

        // UI Changes
        document.getElementById('sidebar').style.marginLeft = "-350px"; 
        document.getElementById('vm-tool-bar').style.top = "0";
        document.getElementById('active-os-name').innerText = "RUNNING: EDEN_CORE";
        const status = document.getElementById('boot-status');
        status.innerText = "[ LOADING ASSETS... ]";

        const osUrl = document.getElementById('os_select').value;
        
        const config = {
            // Points to the engine binary
            wasm_path: "https://cdn.jsdelivr.net",
            memory_size: parseInt(document.getElementById('ram').value) * 1024 * 1024,
            vga_memory_size: 8 * 1024 * 1024,
            screen_container: document.getElementById("screen_container"),
            // Core BIOS files from the master build
            bios: { url: "https://cdn.jsdelivr.net" },
            vga_bios: { url: "https://cdn.jsdelivr.net" },
            autostart: true,
        };

        // Assign source based on extension
        if (osUrl.endsWith('.img')) {
            config.fda = { url: osUrl };
        } else {
            config.cdrom = { url: osUrl };
        }

        try {
            emulator = new V86Starter(config);
            
            // This event triggers when the VM displays its first visual frame
            emulator.add_listener("screen-set-mode", function() {
                document.querySelector("#screen_container canvas").style.display = "block";
                status.style.display = "none";
            });
        } catch (e) {
            status.innerText = "[ BOOT FAILED ]";
            console.error(e);
        }
    }
</script>
</body>
</html>

        }
    }
</script>
</body>
</html>
