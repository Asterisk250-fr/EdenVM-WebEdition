<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdenVM | Pro Dashboard</title>
    <!-- v86 Core Engine -->
    <script src="https://cdn.jsdelivr.net"></script>
    <!-- Playwrite + Inter Fonts -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { 
            --bg: #050505; 
            --accent: #00fff0; 
            --accent-alt: #ff00ea; 
            --panel: rgba(255, 255, 255, 0.05);
            --glass: rgba(10, 10, 10, 0.8);
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            /* Gradient Background */
            background-image: radial-gradient(circle at 20% 30%, #1a1a2e 0%, #050505 100%);
            color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        /* Home Menu Overlay */
        #home-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            z-index: 1000; display: flex; flex-direction: column; align-items: center; padding: 50px;
            box-sizing: border-box; overflow-y: auto;
        }

        .playwrite-text { font-family: 'Playwrite DE Grund', cursive; color: var(--accent); }
        .logo-large { font-size: 48px; margin-bottom: 40px; text-shadow: 0 0 20px var(--accent); }

        /* VM Grid */
        #vm-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px; width: 100%; max-width: 1200px;
        }

        .vm-card {
            background: var(--panel); border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; border-radius: 15px; transition: 0.3s; cursor: pointer;
            position: relative; overflow: hidden;
        }
        .vm-card:hover { border-color: var(--accent); transform: translateY(-5px); background: rgba(255,255,255,0.1); }
        .vm-card h3 { margin: 0; font-family: 'Playwrite DE Grund'; font-size: 18px; }
        .vm-card p { font-size: 12px; color: #888; margin: 10px 0; }

        /* Sidebar & Main VM View */
        #interface { display: flex; flex-grow: 1; width: 100%; height: 100%; visibility: hidden; }
        #sidebar { 
            width: 350px; background: var(--glass); border-right: 1px solid #333; 
            padding: 20px; overflow-y: auto; z-index: 10; 
        }
        .section { background: #1a1a1a; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        label { display: block; font-size: 10px; color: #888; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; margin-top: 5px; box-sizing: border-box; }
        
        #main { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        #screen_container canvas { display: none; box-shadow: 0 0 50px rgba(0,255,240,0.3); }

        /* Buttons */
        .btn { 
            padding: 15px 25px; border-radius: 8px; border: none; font-weight: bold; 
            cursor: pointer; font-family: 'Inter'; text-transform: uppercase; transition: 0.3s;
        }
        .btn-primary { background: var(--accent); color: #000; width: 100%; margin-top: 10px; }
        .btn-create { background: var(--accent-alt); color: #fff; margin-bottom: 40px; }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }

        #vm-tool-bar { 
            position: fixed; top: -70px; left: 0; width: 100%; height: 60px; 
            background: rgba(5,5,5,0.9); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--accent); 
            transition: 0.5s; z-index: 100; box-sizing: border-box;
        }
    </style>
</head>
<body>

<!-- Home Menu -->
<div id="home-menu">
    <div class="logo-large playwrite-text">EdenVM_</div>
    <button class="btn btn-create" onclick="showCreator()">+ Create New Virtual Machine</button>
    <div id="vm-grid">
        <!-- Saved VMs appear here -->
    </div>
</div>

<div id="vm-tool-bar">
    <div class="playwrite-text" id="active-os-name" style="font-size: 14px;">VM: OFFLINE</div>
    <div>
        <button onclick="location.reload()" style="background:none; border:1px solid #ff4d4d; color:#ff4d4d; padding:8px 15px; cursor:pointer; border-radius:5px;">TERMINATE</button>
    </div>
</div>

<div id="interface">
    <div id="sidebar">
        <div class="playwrite-text" style="font-size: 20px; margin-bottom: 20px;">Configuration</div>
        
        <div class="section">
            <label>Machine Name</label>
            <input type="text" id="vm_name" value="My New VM">
            <label>Memory (RAM MB)</label>
            <input type="number" id="ram" value="512">
        </div>

        <div class="section">
            <label>Disk & Storage</label>
            <select id="drive_type">
                <option value="hdd">Mechanical HDD</option>
                <option value="ssd">SSD Flash</option>
                <option value="nvme">NVMe Ultra</option>
            </select>
            <select id="hdd_size" style="margin-top:10px;">
                <option value="0">No Disk</option>
                <option value="2147483648">2 GB</option>
                <option value="10737418240">10 GB</option>
            </select>
        </div>

        <div class="section">
            <label>VGA Graphics</label>
            <select id="vga_type">
                <option value="std">Standard VGA</option>
                <option value="cirrus">Cirrus Logic</option>
            </select>
        </div>

        <div class="section">
            <label>OS Image (ISO)</label>
            <select id="os_select">
                <option value="https://copy.sh">Buildroot Linux</option>
                <option value="https://copy.sh">KolibriOS (GUI)</option>
            </select>
        </div>

        <button class="btn btn-primary" onclick="saveAndBoot()">Save & Launch VM</button>
        <button class="btn" style="background:#333; color:white; width:100%; margin-top:10px;" onclick="location.reload()">Back to Menu</button>
    </div>

    <div id="main">
        <div id="screen_container">
            <div id="boot-status" class="playwrite-text">[ INITIALIZING EDEN_CORE ]</div>
            <canvas></canvas>
        </div>
    </div>
</div>

<script>
    let emulator = null;

    // Load saved VMs on start
    window.onload = function() {
        const saved = JSON.parse(localStorage.getItem('edenvms') || '[]');
        const grid = document.getElementById('vm-grid');
        grid.innerHTML = '';
        
        saved.forEach((vm, index) => {
            const card = document.createElement('div');
            card.className = 'vm-card';
            card.innerHTML = `
                <h3>${vm.name}</h3>
                <p>RAM: ${vm.ram}MB | Disk: ${vm.disk === "0" ? "None" : "Available"}</p>
                <p style="color:var(--accent)">OS: ${vm.osName}</p>
            `;
            card.onclick = () => launchSavedVM(index);
            grid.appendChild(card);
        });
    };

    function showCreator() {
        document.getElementById('home-menu').style.display = 'none';
        document.getElementById('interface').style.visibility = 'visible';
    }

    function saveAndBoot() {
        const vmData = {
            name: document.getElementById('vm_name').value,
            ram: document.getElementById('ram').value,
            disk: document.getElementById('hdd_size').value,
            os: document.getElementById('os_select').value,
            osName: document.getElementById('os_select').options[document.getElementById('os_select').selectedIndex].text
        };
        
        const saved = JSON.parse(localStorage.getItem('edenvms') || '[]');
        saved.push(vmData);
        localStorage.setItem('edenvms', JSON.stringify(saved));
        
        boot(vmData);
    }

    function launchSavedVM(index) {
        const saved = JSON.parse(localStorage.getItem('edenvms'));
        showCreator();
        boot(saved[index]);
    }

    async function boot(configData) {
        if (typeof V86Starter === "undefined") return alert("Engine Loading...");

        document.getElementById('active-os-name').innerText = "VM: " + configData.name.toUpperCase();
        document.getElementById('sidebar').style.marginLeft = "-350px"; 
        document.getElementById('vm-tool-bar').style.top = "0";

        const config = {
            wasm_path: "https://cdn.jsdelivr.net",
            memory_size: parseInt(configData.ram) * 1024 * 1024,
            vga_memory_size: 16 * 1024 * 1024,
            screen_container: document.getElementById("screen_container"),
            bios: { url: "https://cdn.jsdelivr.net" },
            vga_bios: { url: "https://cdn.jsdelivr.net" },
            autostart: true,
        };

        if(configData.disk > 0) config.hda = { size: configData.disk };
        
        if(configData.os.endsWith('.img')) config.fda = { url: configData.os };
        else config.cdrom = { url: configData.os };

        try {
            emulator = new V86Starter(config);
            emulator.add_listener("screen-set-mode", function() {
                document.querySelector("#screen_container canvas").style.display = "block";
                document.getElementById('boot-status').style.display = "none";
            });
        } catch(e) {
            console.error(e);
            alert("Boot Failed. Check browser console.");
        }
    }
</script>
</body>
</html>
