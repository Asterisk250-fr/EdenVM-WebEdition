<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdenVM | Pro Console</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <!-- Corrected V86 Library Link -->
    <script src="https://copy.sh"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --accent: var(--accent-neon, #00fff0); 
            --panel: var(--glass-bg, rgba(255, 255, 255, 0.05));
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-dark, #050505); 
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            color: var(--text-primary, #f8f9fa); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        #sidebar { 
            width: 350px; 
            background: rgba(10, 10, 10, 0.8); 
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--glass-border, rgba(255,255,255,0.1)); 
            padding: 25px; 
            overflow-y: auto; 
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 10;
        }

        .logo { 
            font-family: 'Orbitron', sans-serif;
            font-size: 24px; 
            color: var(--accent-neon); 
            margin-bottom: 30px; 
            text-shadow: 0 0 10px var(--accent-neon);
        }

        .section { 
            background: var(--glass-bg); 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 1px solid var(--glass-border); 
            transition: 0.3s;
        }
        .section:hover { border-color: var(--accent-secondary); }

        label { display: block; font-size: 10px; color: #888; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px;}
        input, select { 
            width: 100%; padding: 10px; background: rgba(0,0,0,0.5); 
            border: 1px solid #333; color: #fff; border-radius: 6px; margin-top: 5px; 
            box-sizing: border-box; outline: none;
        }
        input:focus, select:focus { border-color: var(--accent-neon); }

        #vm-tool-bar { 
            position: fixed; top: -70px; left: 0; width: 100%; height: 60px; 
            background: rgba(5, 5, 5, 0.95); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 30px; 
            border-bottom: 2px solid var(--accent-neon); transition: 0.5s; z-index: 100; box-sizing: border-box;
        }

        #main { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        
        #screen_container { background: #000; line-height: 0; position: relative; }
        #screen_container canvas { display: none; box-shadow: 0 0 50px rgba(0, 255, 240, 0.2); border: 1px solid #222; }

        #boot-status {
            color: var(--accent-neon);
            font-family: 'Orbitron', monospace;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-boot { 
            width: 100%; padding: 16px; 
            background: linear-gradient(45deg, var(--accent-neon, #00fff0), var(--accent-secondary, #ff00ea)); 
            border: none; font-weight: bold; border-radius: 8px; cursor: pointer; 
            font-size: 14px; margin-top: 20px; color: #000; font-family: 'Orbitron';
            transition: 0.3s;
        }
        .btn-boot:hover { transform: scale(1.02); filter: brightness(1.2); box-shadow: 0 0 20px var(--accent-neon); }
    </style>
</head>
<body>

<div id="vm-tool-bar">
    <div style="color: var(--accent-neon); font-family: 'Orbitron'; font-size: 14px;" id="active-os-name">SYSTEM: OFFLINE</div>
    <div class="controls-right">
        <button onclick="toggleFS()" style="background:none; border:1px solid var(--accent-neon); color:white; padding:5px 15px; cursor:pointer; border-radius:4px; font-family: 'Orbitron'; font-size: 10px;">FULLSCREEN</button>
        <button onclick="location.reload()" style="background:none; border:1px solid #ff4d4d; color:#ff4d4d; padding:5px 15px; cursor:pointer; margin-left:10px; border-radius:4px; font-family: 'Orbitron'; font-size: 10px;">SHUTDOWN</button>
    </div>
</div>

<div id="sidebar">
    <div class="logo">EdenVM_</div>
    
    <div class="section">
        <label>CPU & RAM (MB)</label>
        <input type="number" id="ram" value="512">
        <label>CPU Features</label>
        <select id="cpu_gen"><option value="default">Standard x86</option><option value="acpi">ACPI Enabled</option></select>
    </div>

    <div class="section">
        <label>Storage Configuration</label>
        <select id="hdd_size">
            <option value="0">No Hard Disk (Live ISO)</option>
            <option value="2147483648">2 GB Virtual Disk</option>
            <option value="10737418240">10 GB Virtual Disk</option>
        </select>
    </div>

    <div class="section">
        <label>Boot Source</label>
        <select id="os_select" onchange="document.getElementById('up_row').style.display=(this.value=='up'?'block':'none')">
            <option value="https://copy.sh">Buildroot Linux (Fast)</option>
            <option value="https://copy.sh">KolibriOS (GUI)</option>
            <option value="up">-- Upload Local ISO --</option>
        </select>
        <div id="up_row" style="display:none; margin-top:10px;">
            <input type="file" id="local_iso">
        </div>
    </div>

    <button class="btn-boot" onclick="boot()">INITIALIZE EdenVM</button>
</div>

<div id="main">
    <div id="screen_container">
        <div id="boot-status">[ SYSTEM_READY ]</div>
        <canvas></canvas>
    </div>
</div>

<script>
    let emulator = null;

    async function getBuf(id) {
        const fileInput = document.getElementById(id);
        if(!fileInput.files.length) return null;
        return new Promise(res => {
            const reader = new FileReader();
            reader.onload = e => res(e.target.result);
            reader.readAsArrayBuffer(fileInput.files[0]);
        });
    }

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    async function boot() {
        if (typeof V86Starter === "undefined") {
            alert("Emulator engine failed to load. Check your internet connection.");
            return;
        }

        const osSelect = document.getElementById('os_select');
        const osName = osSelect.value === 'up' ? document.getElementById('local_iso').files[0]?.name : osSelect.options[osSelect.selectedIndex].text;
        
        // UI Transitions
        document.getElementById('active-os-name').innerText = "VM: " + (osName || "UNKNOWN").toUpperCase();
        document.getElementById('sidebar').style.marginLeft = "-350px"; 
        document.getElementById('vm-tool-bar').style.top = "0";
        
        const status = document.getElementById('boot-status');
        status.innerText = "[ BOOTING KERNEL... ]";

        const config = {
            wasm_path: "https://copy.sh",
            memory_size: parseInt(document.getElementById('ram').value) * 1024 * 1024,
            vga_memory_size: 16 * 1024 * 1024,
            screen_container: document.getElementById("screen_container"),
            bios: { url: "https://copy.sh" },
            vga_bios: { url: "https://copy.sh" },
            autostart: true,
        };

        const hSize = parseInt(document.getElementById('hdd_size').value);
        if(hSize > 0) config.hda = { size: hSize };

        if(osSelect.value === 'up') {
            const iso = await getBuf('local_iso');
            if(!iso) return alert("No ISO selected.");
            config.cdrom = { buffer: iso };
        } else {
            // v86 auto-detects .img vs .iso based on property
            if (osSelect.value.endsWith('.img')) config.fda = { url: osSelect.value };
            else config.cdrom = { url: osSelect.value };
        }

        try {
            emulator = new V86Starter(config);
            
            // Reveal canvas when video mode is set
            emulator.add_listener("screen-set-mode", function() {
                document.querySelector("#screen_container canvas").style.display = "block";
                status.style.display = "none";
            });
        } catch (e) {
            status.innerText = "[ BOOT FAILED ]";
            console.error(e);
        }
    }
</script>
</body>
</html>
