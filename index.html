<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EDEN-VM For WEB</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: monospace;
}

#screen {
  width: 100vw;
  height: 100vh;
}

#vm-stats {
  position: fixed;
  top: 0;
  width: 100%;
  background: black;
  color: lime;
  padding: 5px;
  z-index: 9999;
}

#controls {
  position: fixed;
  bottom: 10px;
  left: 10px;
  z-index: 10000;
  background: #111;
  padding: 10px;
}
</style>
</head>
<body>

<div id="vm-stats">
  CPU: <span id="cpu">0%</span> |
  RAM: <span id="ram">0MB</span> |
  Disk: <span id="disk">None</span>
</div>

<div id="screen"></div>

<div id="controls">
  <button onclick="startVM()">Start VM</button><br><br>

  <button onclick="createDiskPrompt()">Create Disk</button>
  <button onclick="refreshDisks()">Refresh</button><br>

  <select id="diskSelect"></select><br><br>

  <input type="file" id="isoUpload">
</div>

<script src="https://copy.sh/v86/build/libv86.js"></script>
<script src="disk.js"></script>
<script src="vm.js"></script>

</body>
</html>
